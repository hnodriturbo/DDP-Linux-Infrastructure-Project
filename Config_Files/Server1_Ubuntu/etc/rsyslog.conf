# ==========================================
# Remote Syslog Server Configuration
# Purpose:
# - Receive logs from client systems
# - Store centralized infrastructure logs
# ==========================================

# Enable UDP syslog reception
module(load="imudp")
input(type="imudp" port="514")

# Enable TCP syslog reception
module(load="imtcp")
input(type="imtcp" port="514")

# Store remote logs by hostname
$template RemoteLogs,"/var/log/remote/%HOSTNAME%/syslog.log"

*.* ?RemoteLogs
& stop