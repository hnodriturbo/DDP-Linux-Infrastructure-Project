# ================================
# Netplan Configuration - DDP client1 DHCP
# ================================
# Path: /etc/netplan/00-installer-config.yaml
# Purpose:
# - Receive network configuration from server1 DHCP
# - Automatically receive IP, gateway, and DNS settings
# - Use the DDP internal LAN only
# ================================

network:
  version: 2
  renderer: networkd

  ethernets:
    ens33:
      dhcp4: true
