# ================================
# Netplan Configuration - DDP client1
# ================================
# Purpose:
# - Configure client1 on the DDP private LAN
# - Use server1 as gateway and DNS server
# - Prepare for later DHCP migration
# ================================

network:
  version: 2
  renderer: networkd

  ethernets:
    ens33:
      dhcp4: false
      addresses:
        - 192.168.100.20/24
      routes:
        - to: default
          via: 192.168.100.10
      nameservers:
        addresses:
          - 192.168.100.10
        search:
          - ddp.is
